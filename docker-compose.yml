version: "3.9"

services:
  craftpanel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: craftpanel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist server data & modpack files
      - craftpanel_data:/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      # Change this in production! Used for session encryption.
      - SESSION_SECRET=change-me-in-production-please
    networks:
      - craftpanel_net

  # Optional: Run alongside your Minecraft servers
  # Uncomment and configure to add your servers here
  # mc-server-1:
  #   image: itzg/minecraft-server:latest
  #   container_name: mc-survival
  #   restart: unless-stopped
  #   ports:
  #     - "25565:25565"
  #   volumes:
  #     - mc_survival_data:/data
  #   environment:
  #     - EULA=TRUE
  #     - TYPE=PAPER
  #     - VERSION=1.21.4
  #     - MEMORY=4G
  #     - MAX_PLAYERS=20
  #   networks:
  #     - craftpanel_net

volumes:
  craftpanel_data:
  # mc_survival_data:

networks:
  craftpanel_net:
    driver: bridge
