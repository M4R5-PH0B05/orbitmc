version: "3.9"

services:
  craftpanel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: craftpanel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist panel data
      - craftpanel_data:/data
      # REQUIRED: gives OrbitMC access to the host Docker daemon
      # so it can create/start/stop Minecraft server containers.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=8080
      # Change this in production!
      - SESSION_SECRET=change-me-in-production-please
    # Run as root so the node process can access the Docker socket.
    # Alternatively: add the container user to the docker group on the host.
    user: root
    networks:
      - craftpanel_net

volumes:
  craftpanel_data:

networks:
  craftpanel_net:
    driver: bridge
