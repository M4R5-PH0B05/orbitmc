version: "3.9"

services:
  craftpanel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: craftpanel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - craftpanel_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:Z
    environment:
      - NODE_ENV=production
      - PORT=8080
      - SESSION_SECRET=change-me-in-production-please
      - DATABASE_URL=postgres://postgres:Morgan1206!@Postgres:5432/postgres
    user: root
    security_opt:
      - label=disable
    networks:
      - craftpanel_net
      - minecraftdclink_default

volumes:
  craftpanel_data:

networks:
  craftpanel_net:
    driver: bridge
  minecraftdclink_default:
    external: true
